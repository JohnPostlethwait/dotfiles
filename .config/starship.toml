"$schema" = 'https://starship.rs/config-schema.json'

# Tokyo Night minimal — two-line prompt
# Top line: dir, git, language versions, command duration
# Middle line: clock + time
# Bottom line: prompt character

format = """
$directory\
${custom.git_info}\
$git_status\
$cmd_duration\
$line_break\
$nodejs\
$python\
$rust\
$golang\
$time\
${custom.nowplaying}\
$line_break\
$character"""

add_newline = true
palette = "tokyo_night"

[palettes.tokyo_night]
bg          = "#1a1b26"
fg          = "#c0caf5"
blue        = "#7aa2f7"
cyan        = "#7dcfff"
purple      = "#bb9af7"
pink        = "#f7768e"
green       = "#9ece6a"
yellow      = "#e0af68"
orange      = "#ff9e64"
red         = "#f7768e"
comment     = "#565f89"

[directory]
style = "bold blue"
format = "[ $path ]($style)  "
truncation_length = 0
truncate_to_repo = false

[git_branch]
disabled = true

[git_status]
style = "pink"
format = "[$all_status]($style)  "
conflicted = " "
ahead      = " ${count}"
behind     = " ${count}"
diverged   = "⇕ ${ahead_count}${behind_count}"
untracked  = " ${count}"
stashed    = " "
modified   = " ${count}"
staged     = " ${count}"
renamed    = " ${count}"
deleted    = " ${count}"

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version) ]($style)  "

[python]
symbol = " "
style = "yellow"
format = '[$symbol${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)  '

[rust]
symbol = " "
style = "orange"
format = "[$symbol($version) ]($style)  "

[golang]
symbol = " "
style = "cyan"
format = "[$symbol($version) ]($style)  "

[cmd_duration]
min_time = 2_000
style = "comment"
format = "[ took $duration]($style)  "

[time]
disabled = false
use_12hr = true
time_format = "%-I:%M:%S %p"
style = "comment"
format = "[ $time ]($style)  "

[character]
success_symbol = "[❯](bold purple)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[hostname]
disabled = true


[username]
disabled = true

[package]
disabled = true

[custom.nowplaying]
command = "$HOME/.bin/np-cache.sh"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
style = "purple"
format = "[$output]($style)  "
description = "Cached macOS now-playing (Roon/Spotify/Apple Music)"

[custom.git_info]
command = "$HOME/.bin/git-prompt.sh"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
shell = ["bash", "--noprofile", "--norc"]
format = "$output  "
description = "Branch vs worktree with embedded ahead count"
